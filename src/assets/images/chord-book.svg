<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Guitar pick shape -->
  <path d="M400 120 L460 280 L400 340 L340 280 Z" fill="url(#accent)" opacity="0.15"/>
  <!-- Musical notes -->
  <text x="200" y="200" font-size="80" fill="url(#accent)" opacity="0.3" font-family="serif">&#9835;</text>
  <text x="550" y="350" font-size="60" fill="url(#accent)" opacity="0.25" font-family="serif">&#9834;</text>
  <text x="300" y="400" font-size="50" fill="url(#accent)" opacity="0.2" font-family="serif">&#9833;</text>
  <!-- Chord diagram lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.4" fill="none">
    <line x1="360" y1="180" x2="360" y2="300"/>
    <line x1="380" y1="180" x2="380" y2="300"/>
    <line x1="400" y1="180" x2="400" y2="300"/>
    <line x1="420" y1="180" x2="420" y2="300"/>
    <line x1="440" y1="180" x2="440" y2="300"/>
    <line x1="355" y1="200" x2="445" y2="200"/>
    <line x1="355" y1="230" x2="445" y2="230"/>
    <line x1="355" y1="260" x2="445" y2="260"/>
    <line x1="355" y1="290" x2="445" y2="290"/>
  </g>
  <!-- Fingering dots -->
  <circle cx="380" cy="215" r="8" fill="#3b82f6" opacity="0.6"/>
  <circle cx="420" cy="245" r="8" fill="#3b82f6" opacity="0.6"/>
  <circle cx="400" cy="275" r="8" fill="#8b5cf6" opacity="0.6"/>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" font-size="32" font-weight="bold" fill="#e2e8f0" font-family="system-ui, sans-serif">Chord Book</text>
  <text x="400" y="460" text-anchor="middle" font-size="16" fill="#94a3b8" font-family="system-ui, sans-serif">隨身歌譜本</text>
</svg>
